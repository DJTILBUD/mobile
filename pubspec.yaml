name: dj_tilbud_app
description: "DJ Tilbud - Musician mobile app"
publish_to: 'none'
version: 1.0.1+8

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  image_picker: ^1.2.1
  http: ^1.2.2
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  shared_preferences: ^2.3.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env.local
    - .env.dev
    - .env.prod
